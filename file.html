<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Speed Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      margin-top: 100px;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ff6b6b;
      color: white;
    }
    button:hover {
      background: #ff4b4b;
    }
    h1 {
      font-size: 40px;
    }
    #score {
      font-size: 30px;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Click Speed Game</h1>
    <p>10 soniyada nechta bosishingizni tekshiring!</p>
    <div id="score">Score: 0</div>
    <button onclick="startGame()">Start</button>
    <button onclick="clickMe()">CLICK!</button>
    <p id="time"></p>
  </div>

  <script>
    let score = 0;
    let timeLeft = 10;
    let gameActive = false;

    function startGame() {
      score = 0;
      timeLeft = 10;
      gameActive = true;
      document.getElementById('score').innerText = 'Score: 0';
      document.getElementById('time').innerText = 'Time: ' + timeLeft;

      let timer = setInterval(() => {
        timeLeft--;
        document.getElementById('time').innerText = 'Time: ' + timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          gameActive = false;
          alert('Game over! Your score: ' + score);
        }
      }, 1000);
    }

    function clickMe() {
      if (gameActive) {
        score++;
        document.getElementById('score').innerText = 'Score: ' + score;
      }
    }
  </script>
</body>
</html>
